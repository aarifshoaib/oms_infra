# Copy this file into each service repo as:
#   .github/workflows/deploy.yml
#
# Then replace SERVICE_NAME with one of:
#   backend  →  for ls_server repo
#   bff      →  for ls_bff repo
#   frontend →  for ls_client repo
#
# Also set this secret in each service repo:
#   DEPLOY_TOKEN  →  GitHub PAT with repo scope on oms-infra repo

name: Trigger Deploy

on:
  push:
    branches:
      - development
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger UAT deploy
        if: github.ref == 'refs/heads/development'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: aarifshoaib/oms-infra
          event-type: deploy-uat
          client-payload: '{"service": "SERVICE_NAME"}'

      - name: Trigger Production deploy
        if: github.ref == 'refs/heads/main'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: aarifshoaib/oms-infra
          event-type: deploy-prod
          client-payload: '{"service": "SERVICE_NAME"}'

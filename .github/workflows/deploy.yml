name: Deploy OMS

on:
  repository_dispatch:
    types: [deploy-uat, deploy-prod]

jobs:
  # ── UAT: auto on dispatch from any service repo (development branch) ──
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    if: github.event.action == 'deploy-uat'
    environment:
      name: UAT
      url: https://uat-ls.zyntlabs.com

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UAT_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} -H ${{ secrets.UAT_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to UAT
        env:
          SERVICE: ${{ github.event.client_payload.service }}
          DEPLOY_PATH: ${{ secrets.UAT_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.UAT_SERVER_USER }}
          SERVER_HOST: ${{ secrets.UAT_SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          ssh -p $SERVER_PORT $SERVER_USER@$SERVER_HOST << ENDSSH
            set -e
            echo "=== Pulling $SERVICE ==="
            cd $DEPLOY_PATH/$SERVICE
            git fetch origin
            git reset --hard origin/Development

            case "$SERVICE" in
              ls_bff)    COMPOSE_SERVICE="bff" ;;
              ls_server) COMPOSE_SERVICE="backend" ;;
              ls_client) COMPOSE_SERVICE="frontend" ;;
              *)         COMPOSE_SERVICE="$SERVICE" ;;
            esac

            echo "=== Pulling oms_infra config ==="
            cd $DEPLOY_PATH/oms_infra
            git fetch origin
            git reset --hard origin/main

            echo "=== Rebuilding $COMPOSE_SERVICE container ==="
            docker compose -f docker-compose.uat.yml --env-file .env.uat up -d --build --no-deps $COMPOSE_SERVICE
            docker image prune -f

            echo "=== Done: $SERVICE deployed to UAT ==="
          ENDSSH

      - name: Health check
        run: |
          sleep 20
          curl -sf https://uat-ls.zyntlabs.com/bff/health || echo "Warning: health check failed"

  # ── Production: requires manual approval ─────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.action == 'deploy-prod'
    environment:
      name: Production
      url: https://prod-ls.zyntlabs.com

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Production
        env:
          SERVICE: ${{ github.event.client_payload.service }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
          SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_SSH_PORT }}
        run: |
          ssh -p $SERVER_PORT $SERVER_USER@$SERVER_HOST << ENDSSH
            set -e
            echo "=== Pulling $SERVICE ==="
            cd $DEPLOY_PATH/$SERVICE
            git fetch origin
            git reset --hard origin/main

            echo "=== Rebuilding $SERVICE container ==="
            cd $DEPLOY_PATH/oms-infra
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build $SERVICE
            docker image prune -f

            echo "=== Done: $SERVICE deployed to Production ==="
          ENDSSH

      - name: Health check
        run: |
          sleep 20
          curl -sf https://prod-ls.zyntlabs.com/bff/health || echo "Warning: health check failed"

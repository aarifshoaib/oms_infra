# Run UAT stack locally on your Mac for testing
# Usage: docker compose -f docker-compose.uat.local.yml --env-file .env.uat.local up -d

services:
  mongodb:
    image: mongo:4.4
    container_name: oms-mongodb-uat-local
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-oms}
    ports:
      - "27018:27017"
    volumes:
      # Bind mount — data lives on your Mac, survives container rebuilds/down
      - ${HOME}/.oms-local/mongodb:/data/db
    networks:
      - oms-network-local
    healthcheck:
      test: ["CMD-SHELL", "mongo -u $MONGO_INITDB_ROOT_USERNAME -p $MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      network: host
    container_name: oms-backend-uat-local
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      JWT_ACCESS_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_EXPIRATION:-24h}
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@zyntlabs.com}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - oms-network-local

  bff:
    build:
      context: ../bff
      dockerfile: Dockerfile
      network: host
    container_name: oms-bff-uat-local
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3001
      BACKEND_API_URL: http://backend:3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost:8081
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - oms-network-local

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      network: host
      args:
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    container_name: oms-frontend-uat-local
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - bff
    networks:
      - oms-network-local

networks:
  oms-network-local:
    driver: bridge

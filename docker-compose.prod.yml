services:
  backend:
    build:
      context: ../ls_server
      dockerfile: Dockerfile
    container_name: oms-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      JWT_ACCESS_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_EXPIRATION:-24h}
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@zyntlabs.com}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_SESSION_TTL_HOURS: ${WHATSAPP_SESSION_TTL_HOURS:-24}
      WHATSAPP_TEMPLATE_LANGUAGE: ${WHATSAPP_TEMPLATE_LANGUAGE:-en}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MAILCOW_API_URL: ${MAILCOW_API_URL}
      MAILCOW_API_KEY: ${MAILCOW_API_KEY}
      MAILCOW_DEFAULT_DOMAIN: ${MAILCOW_DEFAULT_DOMAIN:-laurelshinetrading.com}
      MAILCOW_DEFAULT_QUOTA_MB: ${MAILCOW_DEFAULT_QUOTA_MB:-3072}
    ports:
      - "3002:3000"
    depends_on:
      redis:
        condition: service_started
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bff:
    build:
      context: ../ls_bff
      dockerfile: Dockerfile
    container_name: oms-bff-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_API_URL: http://backend:3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "3003:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/bff/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../ls_client
      dockerfile: Dockerfile
      args:
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    container_name: oms-frontend-prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - bff
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: oms-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - /opt/oms-data/prod/redis:/data
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oms-network:
    driver: bridge

services:
  mongodb:
    image: mongo:4.4
    container_name: oms-mongodb-uat
    restart: unless-stopped
    # Single-node replica set so Mongoose transactions (PI receive, order create,
    # ledger writes) work. keyFile is required when auth + replSet are both on.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile/keyfile"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-oms}
    ports:
      - "27018:27017"
    volumes:
      # Bind mounts — data lives on the VPS filesystem, never lost on container rebuild or down -v
      - /opt/oms-data/uat/mongodb:/data/db
      - /opt/oms-data/uat/mongodb-config:/data/configdb
      - /opt/oms-data/uat/mongo-keyfile:/etc/mongo-keyfile:ro
    networks:
      - oms-network
    healthcheck:
      test: ["CMD-SHELL", "mongo -u $MONGO_INITDB_ROOT_USERNAME -p $MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../ls_server
      dockerfile: Dockerfile
    container_name: oms-backend-uat
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI}
      JWT_ACCESS_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_EXPIRATION:-24h}
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@zyntlabs.com}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_SESSION_TTL_HOURS: ${WHATSAPP_SESSION_TTL_HOURS:-24}
      WHATSAPP_TEMPLATE_LANGUAGE: ${WHATSAPP_TEMPLATE_LANGUAGE:-en}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bff:
    build:
      context: ../ls_bff
      dockerfile: Dockerfile
    container_name: oms-bff-uat
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3001
      BACKEND_API_URL: http://backend:3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://uat-ls.zyntlabs.com}
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/bff/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ../ls_client
      dockerfile: Dockerfile
      args:
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    container_name: oms-frontend-uat
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - bff
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  oms-network:
    driver: bridge

version: '3.8'

services:
  # MongoDB for UAT environment
  mongodb:
    image: mongo:7.0
    container_name: oms-mongodb-uat
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-oms}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data_uat:/data/db
      - mongodb_config_uat:/data/configdb
    networks:
      - oms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../ls_server
      dockerfile: Dockerfile
    container_name: oms-backend-uat
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:${MONGO_ROOT_PASSWORD}@mongodb:27017/oms?authSource=admin}
      JWT_ACCESS_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_EXPIRATION:-24h}
      JWT_REFRESH_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # BFF Layer
  bff:
    build:
      context: ../ls_bff
      dockerfile: Dockerfile
    container_name: oms-bff-uat
    restart: unless-stopped
    environment:
      NODE_ENV: uat
      PORT: 3001
      BACKEND_API_URL: http://backend:3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://localhost
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/bff/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Frontend
  frontend:
    build:
      context: ../ls_client
      dockerfile: Dockerfile
    container_name: oms-frontend-uat
    restart: unless-stopped
    environment:
      NODE_ENV: uat
    ports:
      - "8081:80"
    depends_on:
      - bff
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  oms-network:
    driver: bridge

volumes:
  mongodb_data_uat:
    driver: local
  mongodb_config_uat:
    driver: local
